<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Believein | Reset Password</title>
  <link rel="stylesheet" href="../css/theme.css?v=20260221" />
  <link rel="stylesheet" href="../css/reset-password.css?v=20260221" />
  <script src="../js/reset-password.js?v=20260221" defer></script>
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <p class="eyebrow">Believein Recovery</p>
      <h1>Reset Password</h1>
      <form id="password-reset-form" action="/for" method="post">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required placeholder="Enter your username" />

        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" name="newPassword" required placeholder="New password" />

        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm password" />

        <p id="error-message"></p>
        <button type="submit" class="submit-btn">Reset Password</button>
      </form>
      <p class="small-link"><a href="login.html">Back to Login</a></p>
    </section>
  </main>
</body>
</html>
